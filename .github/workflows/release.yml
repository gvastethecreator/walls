name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Run full verification suite
        run: bun run verify

      - name: Build Tauri application (NSIS installer)
        run: bun run build

      - name: Read version from tauri.conf.json
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Create portable ZIP
        id: portable
        shell: pwsh
        run: |
          $ver  = "${{ steps.version.outputs.VERSION }}"
          $exe  = "src-tauri/target/release/wallpaper-manager.exe"
          $zip  = "wallpaper-manager-$ver-windows-x64-portable.zip"
          Compress-Archive -Path $exe -DestinationPath $zip
          echo "PATH=$zip" >> $env:GITHUB_OUTPUT

      - name: Locate NSIS installer
        id: nsis
        shell: pwsh
        run: |
          $file = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*-setup.exe" |
                  Sort-Object LastWriteTime -Descending |
                  Select-Object -First 1
          echo "PATH=$($file.FullName)" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          name: "Wallpaper Manager v${{ steps.version.outputs.VERSION }}"
          draft: true
          generate_release_notes: true
          files: |
            ${{ steps.nsis.outputs.PATH }}
            ${{ steps.portable.outputs.PATH }}
