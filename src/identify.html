<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Identify Monitor</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Segoe UI', sans-serif;
      user-select: none;
    }
    .overlay {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(12, 12, 16, 0.58);
    }
    .number {
      width: min(42vh, 42vw);
      height: min(42vh, 42vw);
      border-radius: 999px;
      border: 3px solid rgba(160, 151, 255, 0.9);
      background: rgba(108, 99, 255, 0.86);
      box-shadow: 0 0 30px rgba(108, 99, 255, 0.55);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(72px, 22vw, 220px);
      font-weight: 700;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="number" id="number">?</div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const number = params.get('n') || '?';
    document.getElementById('number').textContent = number;
  </script>
</body>
</html>
