<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallpaper Manager</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <svg class="logo-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2" />
          <line x1="8" y1="21" x2="16" y2="21" />
          <line x1="12" y1="17" x2="12" y2="21" />
        </svg>
        <h1>Wallpaper Manager</h1>
      </div>
      <div class="header-actions">
        <button id="btn-apply" class="btn btn-primary" title="Apply Configuration">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12" />
          </svg>
          Apply Configuration
        </button>
      </div>
    </header>

    <!-- Monitor Grid -->
    <main class="main">
      <div id="monitors-container" class="monitors-grid">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Detecting monitors...</p>
        </div>
      </div>
    </main>

    <!-- Footer with Profile Controls -->
    <footer class="footer">
      <div class="profile-section">
        <div class="profile-controls">
          <select id="profile-select" class="select">
            <option value="">— Select Profile —</option>
          </select>
          <button id="btn-load-profile" class="btn btn-secondary" title="Load Profile">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            Load Profile
          </button>
          <button id="btn-save-profile" class="btn btn-secondary" title="Save Profile">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
              <polyline points="17 21 17 13 7 13 7 21" />
              <polyline points="7 3 7 8 15 8" />
            </svg>
            Save Profile
          </button>
          <button id="btn-delete-profile" class="btn btn-danger" title="Delete Profile">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6" />
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            </svg>
          </button>
          <button id="btn-view-logs" class="btn btn-secondary" title="View Logs">View Logs</button>
          <button id="btn-clear-logs" class="btn btn-secondary" title="Clear Logs">Clear Logs</button>
        </div>
      </div>
      <button id="btn-refresh" class="btn btn-ghost" title="Refresh Monitors">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10" />
          <polyline points="1 20 1 14 7 14" />
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
        </svg>
        Refresh
      </button>
    </footer>

    <!-- Save Profile Modal -->
    <div id="save-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <h2>Save Profile</h2>
        <input type="text" id="profile-name-input" class="input" placeholder="Profile name..." autofocus />
        <div class="modal-actions">
          <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
          <button id="modal-save" class="btn btn-primary">Save</button>
        </div>
      </div>
    </div>

    <!-- Logs Modal -->
    <div id="logs-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content modal-wide">
        <h2>Application Logs</h2>
        <pre id="logs-content" class="logs-view">Loading logs...</pre>
        <div class="modal-actions">
          <button id="logs-refresh" class="btn btn-secondary">Refresh Logs</button>
          <button id="logs-close" class="btn btn-primary">Close</button>
        </div>
      </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
